<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Portal | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f1f5f9;
        }
        .nexus-login {
            background: rgba(30, 41, 59, 0.7);
            padding: 3.5rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 380px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 1.75rem; color: #f1f5f9; margin-bottom: 0.75rem; font-weight: 700; }
        p { color: #94a3b8; margin-bottom: 2.5rem; font-size: 0.95rem; }
        .nexus-btn {
            display: inline-block;
            background: #38bdf8;
            color: #0f172a;
            padding: 1rem 2.5rem;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
        }
        .nexus-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.45);
            background: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="nexus-login">
        <h1>Nexus Portal</h1>
        <p>Awaiting terminal authorization...</p>
        <a href="nexus" class="nexus-btn">Initialize Connection</a>
    </div>
</body>
</html>
