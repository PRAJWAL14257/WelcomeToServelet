<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Portal | Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #f1f5f9;
        }
        .welcome-login {
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
        }
        h1 { font-size: 1.75rem; color: #f1f5f9; margin-bottom: 0.5rem; font-weight: 700; }
        p { color: #94a3b8; margin-bottom: 2rem; font-size: 0.95rem; }
        
        form { text-align: left; }
        .form-group { margin-bottom: 1.5rem; }
        label { 
            display: block; 
            color: #94a3b8; 
            font-size: 0.75rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: #f1f5f9;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }
        
        .welcome-btn {
            width: 100%;
            background: #38bdf8;
            color: #0f172a;
            padding: 1rem;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(56, 189, 248, 0.39);
            margin-top: 1rem;
        }
        .welcome-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.45);
            background: #7dd3fc;
        }
    </style>
</head>
<body>
    <div class="welcome-login">
        <h1>Welcome Portal</h1>
        <p>Enter your credentials to proceed</p>
        
        <form action="welcomeservlet" method="POST">
            <div class="form-group">
                <label for="visitorName">Visitor Name</label>
                <input type="text" id="visitorName" name="visitorName" placeholder="e.g. John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="purpose">Visit Purpose</label>
                <input type="text" id="purpose" name="purpose" placeholder="e.g. System Audit" required>
            </div>
            
            <button type="submit" class="welcome-btn">Initialize Connection</button>
        </form>
    </div>
</body>
</html>
